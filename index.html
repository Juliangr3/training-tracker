<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IRON LOG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{background:#0d0d0d;min-height:100vh}
    body{font-family:'DM Mono','Courier New',monospace;color:#e8e0d5}
    ::placeholder{color:#3a3530}
    input,textarea,select,button{font-family:inherit;outline:none}
    input:focus,textarea:focus{border-color:#e8c84a!important}
    input[type="date"]{color-scheme:dark}
    ::-webkit-scrollbar{width:3px;height:3px}
    ::-webkit-scrollbar-thumb{background:#2a2820;border-radius:2px}
    .nav-btn{cursor:pointer;transition:all .15s;padding-bottom:6px;text-transform:uppercase;letter-spacing:2px;font-size:11px;background:none;border:none;color:#5a5550}
    .nav-btn:hover{color:#e8c84a}
    .nav-btn.active{color:#e8c84a;border-bottom:1px solid #e8c84a}
    .entry-card{transition:background .15s}
    .entry-card:hover{background:#161410!important}
    .del-btn{opacity:0;transition:opacity .15s;cursor:pointer}
    .entry-card:hover .del-btn{opacity:1}
    .edit-btn{cursor:pointer;opacity:0;transition:opacity .15s}
    .entry-card:hover .edit-btn{opacity:.5}
    .edit-btn:hover{opacity:1!important}
    .dd-item:hover{background:#1e1c18!important;color:#e8c84a!important}
    .stat-card{background:#111;border:1px solid #1e1c18;border-radius:8px;padding:18px 20px}
    .top-stat{background:#111;border:1px solid #1a1815;border-radius:8px;padding:20px}
    .phase-pill{border-radius:6px;padding:14px 16px;cursor:pointer;transition:all .15s}
    .phase-pill:hover{border-color:#5a5540!important;background:#141210!important}
    .date-group-row{cursor:pointer;transition:background .15s}
    .date-group-row:hover{background:#161410!important}
    .csv-btn{background:transparent;border:1px solid #2a2820;color:#5a5550;padding:5px 12px;border-radius:4px;font-size:10px;letter-spacing:2px;cursor:pointer;transition:all .15s}
    .csv-btn:hover{border-color:#e8c84a;color:#e8c84a}
    .stall-btn{font-size:9px;color:#3a3530;background:transparent;border:1px solid #2a2820;border-radius:3px;padding:2px 7px;cursor:pointer;letter-spacing:1px}
    .stall-btn:hover{border-color:#6a3030!important;color:#8a5050!important}
    .set-row{border-radius:6px;transition:background .12s}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
    .timer-urgent{animation:pulse 1s ease-in-out infinite}
    @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
    .fade-in{animation:fadeIn .18s ease-out both}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef} = React;

// ── Storage ───────────────────────────────────────────────────────────────────
const LS = {
  get:(k)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
};
const KEYS = {
  entries:    "ironlog-entries-v4",
  prog:       "ironlog-progression-v1",
  phase:      "ironlog-phase-v1",
  cardio:     "ironlog-cardio-v1",
};

// ── Static data ───────────────────────────────────────────────────────────────
const EXERCISE_LIST = [
  {group:"Chest",     exercises:["Bench Press","Incline Bench Press","Close Grip Bench Press","Dumbbell Flys"]},
  {group:"Legs",      exercises:["Barbell Squat","Hack Squat","Deadlift","Calf Raises"]},
  {group:"Shoulders", exercises:["Barbell Shoulder Press","Dumbbell Shoulder Press","Lateral Raises","Shoulder Flys"]},
  {group:"Back",      exercises:["Barbell Rows","Lat Pulldown","Shrugs"]},
  {group:"Core",      exercises:["Crunches","Hanging Leg Raises","Plank"]},
];

const PHASES = [
  {id:1,name:"DELOAD",   days:2,sets:5,reps:5,description:"2 days/week · 5×5 · Build the base"},
  {id:2,name:"STRENGTH", days:3,sets:5,reps:5,description:"3 days/week · 5×5 · Drive progression"},
  {id:3,name:"PEAK",     days:2,sets:5,reps:6,description:"2 days/week · 5×6 · Peak output"},
];

const PHASE_TEMPLATES = {
  2:[
    {day:1,label:"Day 1 — Squat / Push / Pull",exercises:[
      {name:"Barbell Squat",         sets:5,reps:5,weightKey:"squat"},
      {name:"Bench Press",           sets:5,reps:5,weightKey:"bench"},
      {name:"Lat Pulldown",          sets:5,reps:5},
      {name:"Barbell Shoulder Press",sets:5,reps:5},
      {name:"Crunches",              sets:3,reps:15},
    ]},
    {day:2,label:"Day 2 — Hypertrophy",exercises:[
      {name:"Incline Bench Press",   sets:5,reps:5},
      {name:"Barbell Rows",          sets:5,reps:5},
      {name:"Shrugs",                sets:4,reps:10},
      {name:"Lateral Raises",        sets:4,reps:12},
      {name:"Calf Raises",           sets:4,reps:15},
    ]},
    {day:3,label:"Day 3 — Deadlift / Press",exercises:[
      {name:"Barbell Squat",         sets:5,reps:5,weightKey:"squat",weightMult:0.8,note:"80% of Day 1 load"},
      {name:"Close Grip Bench Press",sets:5,reps:5},
      {name:"Deadlift",              sets:5,reps:5,weightKey:"deadlift"},
      {name:"Shoulder Flys",         sets:4,reps:12},
      {name:"Crunches",              sets:3,reps:15},
    ]},
  ]
};

const DEFAULT_PROG = [
  {id:"squat",   label:"Barbell Squat",increment:2.5},
  {id:"bench",   label:"Bench Press",  increment:1.25},
  {id:"deadlift",label:"Deadlift",     increment:2.5},
];
const DEFAULT_PHASE = {currentPhase:1,phaseStartDate:null,transitions:[],stallCounts:{squat:0,bench:0,deadlift:0}};

// ── Date / week helpers ───────────────────────────────────────────────────────
function toDateStr(d=new Date()){return d.toISOString().slice(0,10)}
function fmtDate(s){if(!s)return"";return new Date(s+"T00:00:00").toLocaleDateString("en-AU",{day:"numeric",month:"short",year:"numeric"})}
function fmtDateShort(s){if(!s)return"";return new Date(s+"T00:00:00").toLocaleDateString("en-AU",{day:"numeric",month:"short"})}
function fmtDow(s){if(!s)return"";return new Date(s+"T00:00:00").toLocaleDateString("en-AU",{weekday:"long"})}
function monStart(s){const d=new Date(s+"T00:00:00"),dy=d.getDay();d.setDate(d.getDate()-dy+(dy===0?-6:1));return toDateStr(d)}
function weekEnd(ws){const d=new Date(ws+"T00:00:00");d.setDate(d.getDate()+6);return toDateStr(d)}
function weeksBetween(a,b){return Math.floor((new Date(b+"T00:00:00")-new Date(a+"T00:00:00"))/(7*24*60*60*1e3))}
function pct(a,b){return(!b||b===0)?null:Math.round(((a-b)/b)*100)}

// ISO 8601 week label e.g. "2026-W11"
function isoWeek(dateStr){
  const d=new Date(dateStr+"T00:00:00");
  const thu=new Date(d);thu.setDate(d.getDate()-(d.getDay()+6)%7+3);
  const jan4=new Date(thu.getFullYear(),0,4);
  const w=1+Math.round((thu-jan4)/6048e5);
  return thu.getFullYear()+"-W"+(w<10?"0":"")+w;
}

function DeltaBadge({val,unit=""}){
  if(val===null||val===undefined)return null;
  const up=val>0,zero=val===0;
  return<span style={{fontSize:10,background:zero?"#1a1815":up?"#0d1f0d":"#1f0d0d",color:zero?"#5a5550":up?"#4a9a4a":"#9a4a4a",border:`1px solid ${zero?"#2a2820":up?"#1a3a1a":"#3a1a1a"}`,borderRadius:3,padding:"2px 7px",letterSpacing:1,marginLeft:6}}>{up?"+":""}{val}{unit}</span>;
}

// ── Rest Timer ────────────────────────────────────────────────────────────────
function RestTimer({seconds,onDismiss}){
  const [rem,setRem]=useState(seconds);
  const started=useRef(Date.now());
  useEffect(()=>{
    if(rem<=0){onDismiss();return}
    const t=setTimeout(()=>setRem(Math.max(0,seconds-Math.floor((Date.now()-started.current)/1000))),400);
    return()=>clearTimeout(t);
  },[rem]);
  const r=22,circ=2*Math.PI*r,urgent=rem<=10;
  return(
    <div className="fade-in" style={{position:"fixed",bottom:24,right:24,zIndex:600,background:"#161410",border:"1px solid #2a2820",borderRadius:12,padding:"14px 18px",boxShadow:"0 8px 32px rgba(0,0,0,.85)",display:"flex",alignItems:"center",gap:14,minWidth:160}}>
      <svg width={54} height={54} style={{flexShrink:0}}>
        <circle cx={27} cy={27} r={r} fill="none" stroke="#2a2820" strokeWidth={3}/>
        <circle cx={27} cy={27} r={r} fill="none" stroke={urgent?"#e87070":"#e8c84a"} strokeWidth={3}
          strokeDasharray={circ} strokeDashoffset={circ*(1-rem/seconds)}
          strokeLinecap="round" transform="rotate(-90 27 27)"
          style={{transition:"stroke-dashoffset .4s linear"}}/>
        <text x={27} y={32} textAnchor="middle" fill={urgent?"#e87070":"#e8c84a"}
          fontSize={14} fontFamily="'Bebas Neue',sans-serif" letterSpacing={1}
          className={urgent?"timer-urgent":""}>
          {rem}
        </text>
      </svg>
      <div>
        <div style={{fontSize:9,letterSpacing:3,color:"#3a3530",marginBottom:3}}>REST</div>
        <div style={{fontSize:11,color:"#8a8075",marginBottom:6}}>Next set ready</div>
        <button onClick={onDismiss} style={{fontSize:9,color:"#4a4540",background:"transparent",border:"1px solid #2a2820",borderRadius:3,padding:"2px 8px",cursor:"pointer",letterSpacing:1}}>DISMISS</button>
      </div>
    </div>
  );
}

// ── Guided Workout Modal ──────────────────────────────────────────────────────
function GuidedWorkout({template,progData,formDate,entries,onSave,onClose}){
  function prescribedW(ex){
    if(!ex.weightKey)return"";
    const lift=progData.find(l=>l.id===ex.weightKey);
    if(!lift)return"";
    const base=lift.prescribedWeight||lift.lastLoggedWeight;
    if(!base)return"";
    return String(Math.round(base*(ex.weightMult||1)*2)/2);
  }

  // Build initial set rows per exercise — pre-fill from last session if exists
  function initRows(ex){
    const prevSets=[...entries].reverse().filter(e=>e.exercise===ex.name&&e.setNumber!=null);
    const pw=prescribedW(ex);
    const count=ex.sets;
    if(prevSets.length){
      return Array.from({length:count},(_,i)=>{
        const found=prevSets.find(e=>e.setNumber===i+1);
        return{reps:found?String(found.reps):String(ex.reps),weight:pw||( found?String(found.weight):""),warmup:false,done:false,restSec:null};
      });
    }
    return Array.from({length:count},()=>({reps:String(ex.reps),weight:pw||"",warmup:false,done:false,restSec:null}));
  }

  const [exIdx,setExIdx]       = useState(0);
  const [allRows,setAllRows]   = useState(()=>template.exercises.map(ex=>initRows(ex)));
  const [restOn,setRestOn]     = useState(false);
  const [restDur,setRestDur]   = useState(120);
  const logTimes               = useRef({});

  // re-fill prescribed weight whenever we navigate to a new exercise
  useEffect(()=>{
    const ex=template.exercises[exIdx];
    const pw=prescribedW(ex);
    if(!pw)return;
    setAllRows(prev=>{
      const next=prev.map(r=>[...r]);
      next[exIdx]=next[exIdx].map(r=>r.weight?r:{...r,weight:pw});
      return next;
    });
  },[exIdx]);

  const ex   = template.exercises[exIdx];
  const rows = allRows[exIdx];

  function updRow(si,field,val){
    setAllRows(prev=>{
      const next=prev.map(r=>[...r]);
      next[exIdx][si]={...next[exIdx][si],[field]:val};
      // cascade weight down to blank rows below
      if(field==="weight"){
        for(let j=si+1;j<next[exIdx].length;j++){
          if(!next[exIdx][j].weight)next[exIdx][j]={...next[exIdx][j],weight:val};
        }
      }
      return next;
    });
  }

  function addRow(){
    setAllRows(prev=>{
      const next=prev.map(r=>[...r]);
      const last=next[exIdx][next[exIdx].length-1];
      next[exIdx].push({reps:last?.reps||"5",weight:last?.weight||"",warmup:false,done:false,restSec:null});
      return next;
    });
  }

  function removeRow(si){
    setAllRows(prev=>{
      const next=prev.map(r=>[...r]);
      next[exIdx].splice(si,1);
      return next;
    });
  }

  function logSet(si){
    const now=Date.now();
    const prevKey=`${exIdx}-${si-1}`;
    const rest=logTimes.current[prevKey]?Math.round((now-logTimes.current[prevKey])/1000):null;
    logTimes.current[`${exIdx}-${si}`]=now;
    setAllRows(prev=>{
      const next=prev.map(r=>[...r]);
      next[exIdx][si]={...next[exIdx][si],done:true,restSec:rest};
      return next;
    });
    setRestOn(true);
  }

  function commitAll(){
    const base=Date.now();
    const newEntries=[];
    template.exercises.forEach((ex,ei)=>{
      allRows[ei].forEach((row,si)=>{
        if(!row.done&&!row.weight)return;
        newEntries.push({
          id:String(base+ei*100+si),
          date:formDate,
          exercise:ex.name,
          sets:"1",
          reps:row.reps||"0",
          weight:row.weight||"0",
          notes:row.warmup?"Warm-up set":"",
          pr:false,
          warmup:!!row.warmup,
          setNumber:si+1,
          restAfterSec:row.restSec||null,
          timestamp:new Date(base+ei*100+si).toISOString(),
        });
      });
    });
    onSave(newEntries);
  }

  const doneSets=rows.filter(r=>r.done).length;
  // detect weight drop between consecutive working sets
  const workWeights=rows.filter(r=>!r.warmup&&r.weight).map(r=>parseFloat(r.weight)||0);
  const dropDetected=workWeights.length>=2&&workWeights[workWeights.length-1]<workWeights[workWeights.length-2];

  return(
    <>
      <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.87)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:"12px"}} onClick={onClose}>
      <div className="fade-in" onClick={e=>e.stopPropagation()} style={{background:"#161410",border:"1px solid #2a2820",borderRadius:10,width:"min(560px,100%)",maxHeight:"93vh",display:"flex",flexDirection:"column",boxShadow:"0 24px 64px rgba(0,0,0,.95)"}}>

        {/* Header */}
        <div style={{padding:"18px 22px 14px",borderBottom:"1px solid #1a1815",flexShrink:0}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
            <div>
              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,letterSpacing:2,color:"#e8c84a",lineHeight:1}}>{template.label}</div>
              <div style={{fontSize:10,color:"#3a3530",letterSpacing:2,marginTop:4}}>{fmtDate(formDate)} · {isoWeek(formDate)}</div>
            </div>
            <span onClick={onClose} style={{fontSize:22,color:"#5a5550",cursor:"pointer",padding:"2px 6px"}}>×</span>
          </div>
          {/* Exercise nav pills */}
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {template.exercises.map((e,i)=>{
              const isDone=allRows[i].some(r=>r.done);
              const isActive=i===exIdx;
              return(
                <div key={i} onClick={()=>setExIdx(i)} style={{cursor:"pointer",padding:"4px 10px",borderRadius:20,fontSize:10,letterSpacing:1,border:`1px solid ${isActive?"#e8c84a":isDone?"#2a7a2a":"#2a2820"}`,background:isActive?"#e8c84a18":isDone?"#0d1f0d":"transparent",color:isActive?"#e8c84a":isDone?"#70e870":"#4a4540",whiteSpace:"nowrap",userSelect:"none"}}>
                  {i+1}. {e.name.split(" ").pop()}
                </div>
              );
            })}
          </div>
        </div>

        {/* Body */}
        <div style={{flex:1,overflowY:"auto",padding:"18px 22px"}}>
          {/* Exercise title */}
          <div style={{marginBottom:14}}>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,color:"#fff",letterSpacing:1,lineHeight:1}}>{ex.name}</div>
            {ex.note&&<div style={{fontSize:10,color:"#7a6030",marginTop:4}}>{ex.note}</div>}
            <div style={{fontSize:11,color:"#5a5550",marginTop:4}}>{ex.sets} sets · {ex.reps} reps target</div>
          </div>

          {/* Weight drop warning */}
          {dropDetected&&(
            <div style={{background:"#1a1008",border:"1px solid #7a5020",borderRadius:6,padding:"9px 14px",marginBottom:14,fontSize:11,color:"#e8a040"}}>
              ⚠ Weight dropped — possible overload indicator
            </div>
          )}

          {/* Column headers */}
          <div style={{display:"grid",gridTemplateColumns:"28px 34px 1fr 1fr 64px 28px",gap:8,padding:"0 6px 6px",fontSize:9,letterSpacing:2,color:"#3a3530"}}>
            <span>#</span><span>W</span><span>REPS</span><span>KG</span><span style={{textAlign:"center"}}>ACTION</span><span/>
          </div>

          {/* Set rows */}
          <div style={{display:"flex",flexDirection:"column",gap:5,marginBottom:14}}>
            {rows.map((row,si)=>{
              const wBelow=si>0&&parseFloat(row.weight)>0&&parseFloat(rows[si-1].weight)>0&&parseFloat(row.weight)<parseFloat(rows[si-1].weight);
              return(
                <div key={si} className="set-row" style={{display:"grid",gridTemplateColumns:"28px 34px 1fr 1fr 64px 28px",gap:8,alignItems:"center",padding:"8px 6px",background:row.done?"#0d1a0d":wBelow?"#1a1008":"transparent"}}>
                  <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:18,color:row.done?"#4a9a4a":wBelow?"#e8a040":"#5a5550",textAlign:"center",lineHeight:1}}>{si+1}</div>
                  {/* Warm-up toggle */}
                  <div onClick={()=>updRow(si,"warmup",!row.warmup)} title="Toggle warm-up set"
                    style={{cursor:"pointer",width:26,height:26,borderRadius:4,border:`1px solid ${row.warmup?"#c87820":"#2a2820"}`,background:row.warmup?"#c8782022":"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:row.warmup?"#c87820":"#3a3530",letterSpacing:.5,userSelect:"none",flexShrink:0}}>
                    W
                  </div>
                  <input value={row.reps} onChange={e=>updRow(si,"reps",e.target.value)}
                    placeholder={String(ex.reps)}
                    style={{background:"transparent",border:`1px solid ${row.done?"#1a4a1a":"#2a2820"}`,borderRadius:4,color:row.done?"#6a9a6a":"#e8e0d5",fontSize:15,padding:"7px 10px",width:"100%"}}/>
                  <input value={row.weight} onChange={e=>updRow(si,"weight",e.target.value)}
                    placeholder="kg"
                    style={{background:"transparent",border:`1px solid ${wBelow?"#7a5020":row.done?"#1a4a1a":"#2a2820"}`,borderRadius:4,color:wBelow?"#e8a040":row.done?"#6a9a6a":"#e8e0d5",fontSize:15,padding:"7px 10px",width:"100%"}}/>
                  {row.done
                    ? <div style={{textAlign:"center"}}>
                        <div style={{fontSize:12,color:"#4a9a4a"}}>✓</div>
                        {row.restSec&&<div style={{fontSize:9,color:"#3a5a3a",marginTop:1}}>{row.restSec}s rest</div>}
                      </div>
                    : <button onClick={()=>logSet(si)}
                        style={{background:"#1a2a1a",border:"1px solid #2a5a2a",color:"#70c870",borderRadius:4,padding:"7px 0",fontSize:10,cursor:"pointer",width:"100%",letterSpacing:1}}>
                        LOG
                      </button>
                  }
                  <div onClick={()=>removeRow(si)}
                    style={{cursor:"pointer",color:"#3a2a2a",fontSize:16,textAlign:"center",lineHeight:1,flexShrink:0}}
                    onMouseEnter={e=>e.currentTarget.style.color="#9a4a4a"}
                    onMouseLeave={e=>e.currentTarget.style.color="#3a2a2a"}>×</div>
                </div>
              );
            })}
          </div>

          {/* Add set + rest duration */}
          <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:18,flexWrap:"wrap"}}>
            <button onClick={addRow}
              style={{background:"transparent",border:"1px dashed #2a2820",color:"#5a5550",padding:"7px 16px",borderRadius:4,fontSize:10,cursor:"pointer",letterSpacing:2}}
              onMouseEnter={e=>{e.currentTarget.style.borderColor="#e8c84a";e.currentTarget.style.color="#e8c84a"}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor="#2a2820";e.currentTarget.style.color="#5a5550"}}>
              + ADD SET
            </button>
            <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:10,color:"#3a3530",letterSpacing:1}}>REST TIMER</span>
              <select value={restDur} onChange={e=>setRestDur(Number(e.target.value))}
                style={{background:"#1a1815",border:"1px solid #2a2820",borderRadius:3,color:"#6a6560",fontSize:10,padding:"3px 6px",cursor:"pointer"}}>
                {[60,90,120,180,240].map(s=><option key={s} value={s}>{s}s</option>)}
              </select>
            </div>
          </div>

          <div style={{fontSize:11,color:"#4a4540"}}>
            {doneSets}/{rows.length} sets logged
            {rows.filter(r=>r.warmup&&r.done).length>0&&<span style={{color:"#7a6030"}}> · {rows.filter(r=>r.warmup&&r.done).length} warm-up</span>}
          </div>
        </div>

        {/* Footer */}
        <div style={{padding:"14px 22px",borderTop:"1px solid #1a1815",flexShrink:0,display:"flex",gap:10}}>
          <button onClick={()=>setExIdx(i=>Math.max(0,i-1))} disabled={exIdx===0}
            style={{background:"transparent",border:"1px solid #2a2820",color:exIdx===0?"#2a2820":"#5a5550",padding:"10px 16px",borderRadius:4,fontSize:11,cursor:exIdx===0?"default":"pointer",letterSpacing:1}}>
            ← PREV
          </button>
          <button onClick={()=>exIdx<template.exercises.length-1?setExIdx(i=>i+1):commitAll()}
            style={{flex:1,background:exIdx===template.exercises.length-1?"#4a9a4a":"#e8c84a",border:"none",color:exIdx===template.exercises.length-1?"#fff":"#0d0d0d",padding:"11px",borderRadius:4,fontSize:11,letterSpacing:2,fontWeight:700,cursor:"pointer"}}>
            {exIdx===template.exercises.length-1?"✓ FINISH & SAVE":"NEXT EXERCISE →"}
          </button>
        </div>
      </div>

      </div>
      {restOn&&<RestTimer seconds={restDur} onDismiss={()=>setRestOn(false)}/>}
    </>
  );
}

// ── DayCard: collapsible day card in the day picker ─────────────────────────
function DayCard({tmpl,alreadyLogged,tmplWeight,onStart}){
  const [open,setOpen]=useState(false);
  return(
    <div style={{border:"1px solid #252220",borderRadius:8,overflow:"hidden",background:"#111"}}>
      {/* Always-visible row: tap to expand/collapse */}
      <div onClick={()=>setOpen(o=>!o)}
        style={{padding:"16px 18px",display:"flex",alignItems:"center",gap:12,cursor:"pointer",userSelect:"none"}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
            <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color:"#e8c84a",letterSpacing:1,lineHeight:1}}>DAY {tmpl.day}</span>
            {alreadyLogged&&<span style={{fontSize:9,background:"#0d1f0d",color:"#70e870",border:"1px solid #2a7a2a",borderRadius:3,padding:"2px 7px",letterSpacing:1}}>LOGGED TODAY</span>}
          </div>
          <div style={{fontSize:11,color:"#5a5550",marginTop:4}}>{tmpl.label}</div>
          <div style={{fontSize:10,color:"#3a3530",marginTop:2}}>{tmpl.exercises.length} exercises · tap to {open?"hide":"preview"}</div>
        </div>
        <span style={{fontSize:18,color:"#3a3530",flexShrink:0}}>{open?"▴":"▾"}</span>
      </div>

      {/* Collapsible exercise preview */}
      {open&&(
        <div style={{background:"#0e0e0c",borderTop:"1px solid #1a1815"}}>
          {tmpl.exercises.map((ex,i)=>{
            const w=tmplWeight(ex.weightKey,ex.weightMult);
            return(
              <div key={i} style={{display:"flex",alignItems:"center",padding:"9px 18px",borderBottom:i<tmpl.exercises.length-1?"1px solid #141210":"none",gap:12}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,color:"#c8c0b5"}}>{ex.name}</div>
                  {ex.note&&<div style={{fontSize:10,color:"#7a6030",marginTop:1}}>{ex.note}</div>}
                </div>
                <span style={{fontSize:11,color:"#5a5550",whiteSpace:"nowrap",flexShrink:0}}>{ex.sets}×{ex.reps}</span>
                <span style={{fontSize:13,color:w?"#e8c84a":"#3a3530",whiteSpace:"nowrap",minWidth:52,textAlign:"right",fontFamily:"'Bebas Neue',sans-serif",letterSpacing:.5,flexShrink:0}}>{w?`${w} kg`:"—"}</span>
              </div>
            );
          })}
        </div>
      )}

      {/* START button — always visible, never hidden */}
      <div style={{padding:"12px 16px",borderTop:"1px solid #1a1815",background:"#111"}}>
        <button onClick={onStart}
          style={{width:"100%",background:"#e8c84a",border:"none",color:"#0d0d0d",padding:"13px",borderRadius:6,fontSize:12,letterSpacing:2,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}
          onMouseEnter={e=>e.currentTarget.style.background="#d4b83e"}
          onMouseLeave={e=>e.currentTarget.style.background="#e8c84a"}>
          START DAY {tmpl.day} →
        </button>
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App(){
  const [entries,      setEntries]      = useState([]);
  const [view,         setView]         = useState("log");
  const [form,         setForm]         = useState({exercise:"",sets:"",reps:"",weight:"",notes:"",pr:false});
  const [formDate,     setFormDate]     = useState(toDateStr());
  const [editingId,    setEditingId]    = useState(null);
  const [loaded,       setLoaded]       = useState(false);
  const [flash,        setFlash]        = useState(null);
  const [showDrop,     setShowDrop]     = useState(false);
  const [exFilter,     setExFilter]     = useState("");
  const [customMode,   setCustomMode]   = useState(false);
  const [expandedDate, setExpandedDate] = useState(null);
  const [csvModal,     setCsvModal]     = useState(false);
  const [csvContent,   setCsvContent]   = useState("");
  const [progCfg,      setProgCfg]      = useState(DEFAULT_PROG);
  const [startWeights, setStartWeights] = useState({});
  const [phaseState,   setPhaseState]   = useState(DEFAULT_PHASE);
  const [dayModal,     setDayModal]     = useState(false);
  const [guided,       setGuided]       = useState(null);  // {template}
  const [cardio,       setCardio]       = useState({});    // {dateStr:bool}

  const dropRef = useRef(null);
  const inpRef  = useRef(null);
  const cusRef  = useRef(null);

  useEffect(()=>{
    const h=e=>{if(dropRef.current&&!dropRef.current.contains(e.target))setShowDrop(false)};
    document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);
  },[]);

  useEffect(()=>{
    const e=LS.get(KEYS.entries);  if(e)setEntries(e);
    const p=LS.get(KEYS.prog);     if(p){if(p.startWeights)setStartWeights(p.startWeights);if(p.config)setProgCfg(p.config)}
    const ph=LS.get(KEYS.phase);   if(ph)setPhaseState(s=>({...DEFAULT_PHASE,...ph}));
    const ca=LS.get(KEYS.cardio);  if(ca)setCardio(ca);
    setLoaded(true);
  },[]);

  const saveEntries=d=>LS.set(KEYS.entries,d);
  const saveProg=(sw,cfg)=>LS.set(KEYS.prog,{startWeights:sw,config:cfg});
  const savePhase=ps=>LS.set(KEYS.phase,ps);
  const saveCardio=c=>LS.set(KEYS.cardio,c);

  function flash2(msg,type="success"){setFlash({msg,type});setTimeout(()=>setFlash(null),2400)}

  function switchPhase(toId,reason="manual"){
    const now=toDateStr();
    const ps={...phaseState,currentPhase:toId,phaseStartDate:now,
      transitions:[...phaseState.transitions,{from:phaseState.currentPhase,to:toId,date:now,reason}],
      stallCounts:{squat:0,bench:0,deadlift:0}};
    setPhaseState(ps);savePhase(ps);
    flash2(`Switched to Phase ${toId}: ${PHASES[toId-1].name}`);
  }
  function bumpStall(id){
    const ps={...phaseState,stallCounts:{...phaseState.stallCounts,[id]:(phaseState.stallCounts[id]||0)+1}};
    setPhaseState(ps);savePhase(ps);
  }
  function toggleCardio(d){const c={...cardio,[d]:!cardio[d]};setCardio(c);saveCardio(c)}

  function getLastData(name){
    for(let i=entries.length-1;i>=0;i--){
      const e=entries[i];
      if(e.exercise.toLowerCase()===name.toLowerCase()&&!(editingId&&e.id===editingId))
        return{sets:e.sets,reps:e.reps,weight:e.weight};
    }
    return null;
  }
  function selectEx(name){
    const last=getLastData(name);
    setForm(f=>({...f,exercise:name,sets:last?.sets??f.sets,reps:last?.reps??f.reps,weight:last?.weight??f.weight}));
    setShowDrop(false);
  }
  function addOrUpdate(){
    if(!form.exercise.trim())return;
    const id=editingId||Date.now().toString();
    const entry={id,date:formDate,exercise:form.exercise.trim(),sets:form.sets,reps:form.reps,
      weight:form.weight,notes:form.notes,pr:form.pr,
      warmup:false,setNumber:null,restAfterSec:null,
      timestamp:editingId?(entries.find(e=>e.id===editingId)?.timestamp||new Date().toISOString()):new Date().toISOString()};
    const ne=editingId?entries.map(e=>e.id===editingId?entry:e):[...entries,entry];
    setEntries(ne);saveEntries(ne);
    setForm({exercise:"",sets:"",reps:"",weight:"",notes:"",pr:false});
    setFormDate(toDateStr());setEditingId(null);setCustomMode(false);
    flash2(editingId?"Updated!":"Logged!");
  }
  function deleteEntry(id){const ne=entries.filter(e=>e.id!==id);setEntries(ne);saveEntries(ne);flash2("Removed.","error")}
  function startEdit(entry){
    setForm({exercise:entry.exercise,sets:entry.sets,reps:entry.reps,weight:entry.weight,notes:entry.notes,pr:entry.pr});
    setFormDate(entry.date);setEditingId(entry.id);
    window.scrollTo({top:0,behavior:"smooth"});
  }

  function exportCSV(){
    if(!entries.length){flash2("Nothing to export.","error");return}
    const hdr=["ISO Week","Date","Day of Week","Exercise","Set #","Warm-up","Reps","Weight (kg)","Rest After (sec)","PR","Cardio","Notes"];
    const rows=[...entries].sort((a,b)=>a.date.localeCompare(b.date)||a.timestamp.localeCompare(b.timestamp))
      .map(e=>[isoWeek(e.date),e.date,fmtDow(e.date),`"${e.exercise.replace(/"/g,'""')}"`,
        e.setNumber||"",e.warmup?"Yes":"No",e.reps,e.weight,
        e.restAfterSec||"",e.pr?"Yes":"No",cardio[e.date]?"Yes":"No",
        `"${(e.notes||"").replace(/"/g,'""')}"`]);
    setCsvContent([hdr,...rows].map(r=>r.join(",")).join("\n"));
    setCsvModal(true);
  }

  // ── Stats (excludes warm-up sets) ─────────────────────────────────────────
  function weekStats(ws){
    const we=weekEnd(ws);
    const wE=entries.filter(e=>e.date>=ws&&e.date<=we&&!e.warmup);
    let sets=0,vol=0,prs=0;const days=new Set();
    wE.forEach(e=>{days.add(e.date);const s=parseInt(e.sets)||0,r=parseInt(e.reps)||0,w=parseFloat(e.weight)||0;sets+=s;vol+=s*r*w;if(e.pr)prs++;});
    return{totalEx:wE.length,totalSets:sets,prs,activeDays:days.size,vol:Math.round(vol)};
  }
  function exHistory(name){
    return entries.filter(e=>e.exercise.toLowerCase()===name.toLowerCase()&&!e.warmup)
      .sort((a,b)=>a.date.localeCompare(b.date))
      .map(e=>({date:e.date,weight:parseFloat(e.weight)||0,sets:e.sets,reps:e.reps,pr:e.pr}));
  }
  function exWeekMax(name,ws){
    const we=weekEnd(ws);
    const ws2=entries.filter(e=>e.exercise.toLowerCase()===name.toLowerCase()&&e.date>=ws&&e.date<=we&&!e.warmup);
    if(!ws2.length)return null;
    const wts=ws2.map(e=>parseFloat(e.weight)||0).filter(w=>w>0);
    return wts.length?Math.max(...wts):null;
  }

  // ── Progression: ISO-week keyed, warm-ups excluded ────────────────────────
  function getProgData(){
    const todayW=isoWeek(toDateStr());
    return progCfg.map(lift=>{
      const liftName=lift.label.toLowerCase();
      const weekMap={};
      entries.forEach(e=>{
        if(e.exercise.toLowerCase()!==liftName||e.warmup)return;
        const wk=isoWeek(e.date),w=parseFloat(e.weight)||0;
        if(!weekMap[wk]||w>weekMap[wk])weekMap[wk]=w;
      });
      const sorted=Object.keys(weekMap).sort();
      const sd=startWeights[lift.id];
      let sw=sd?.weight||null,swk=sd?.weekStart||null;
      if(!sw&&sorted.length){sw=weekMap[sorted[0]];swk=sorted[0]}
      let prescribed=null;
      if(sw&&swk){
        // count ISO weeks from swk to todayW
        let cnt=0,cur=swk;
        while(cur<todayW){
          const y=parseInt(cur.slice(0,4)),w=parseInt(cur.slice(6));
          const nw=w>=52?1:w+1,ny=w>=52?y+1:y;
          cur=ny+"-W"+(nw<10?"0":"")+nw;cnt++;
        }
        prescribed=+(sw+cnt*lift.increment).toFixed(2);
      }
      const next=prescribed!==null?+(prescribed+lift.increment).toFixed(2):null;
      const rec=sorted.slice(-3),recW=rec.map(k=>weekMap[k]);
      const stalled=recW.length>=2&&recW.every(w=>w===recW[0]);
      const lastWk=sorted.length?sorted[sorted.length-1]:null;
      return{...lift,prescribedWeight:prescribed,nextWeight:next,
        thisWeekActual:weekMap[todayW]||null,
        lastLoggedWeek:lastWk,lastLoggedWeight:lastWk?weekMap[lastWk]:null,
        stalled,stalledWeeks:stalled?recW.length:0,
        history:sorted.slice(-8).map(wk=>({wk,weight:weekMap[wk]})),
        hasData:sorted.length>0||sw!==null,startWeight:sw,startWeekKey:swk};
    });
  }

  function tmplWeight(weightKey,mult){
    if(!weightKey)return"";
    const m=mult||1;
    const lift=progData.find(l=>l.id===weightKey);
    if(!lift)return"";
    const base=lift.prescribedWeight||lift.lastLoggedWeight;
    if(!base)return"";
    return String(Math.round(base*m*2)/2);
  }

  // ── Derived ───────────────────────────────────────────────────────────────
  const today         = toDateStr();
  const thisMonStart  = monStart(today);
  const thisWeekEnd   = weekEnd(thisMonStart);
  const todayIsoWk    = isoWeek(today);
  const todayEntries  = entries.filter(e=>e.date===formDate).sort((a,b)=>a.timestamp.localeCompare(b.timestamp));
  const byDate        = (()=>{const m={};entries.forEach(e=>{if(!m[e.date])m[e.date]=[];m[e.date].push(e)});return Object.keys(m).sort().reverse().map(d=>({date:d,list:m[d]}))})();
  const loggedExes    = [...new Set(entries.filter(e=>!e.warmup).map(e=>e.exercise))];
  const allMonStarts  = [...new Set(entries.map(e=>monStart(e.date)))].sort();
  const thisWkIdx     = allMonStarts.indexOf(thisMonStart);
  const lastMonStart  = thisWkIdx>0?allMonStarts[thisWkIdx-1]:null;
  const curStat       = weekStats(thisMonStart);
  const prevStat      = lastMonStart?weekStats(lastMonStart):null;
  const progData      = getProgData();
  const weeksInPhase  = phaseState.phaseStartDate?weeksBetween(phaseState.phaseStartDate,today):0;
  const curPhaseObj   = PHASES.find(p=>p.id===phaseState.currentPhase)||PHASES[0];
  const nextPhaseObj  = PHASES.find(p=>p.id===phaseState.currentPhase+1)||null;
  const allStalled    = progData.every(l=>l.stalled||(phaseState.stallCounts[l.id]||0)>=3);

  if(!loaded)return<div style={{background:"#0a0a0a",minHeight:"100vh",color:"#e8c84a",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Bebas Neue',sans-serif",fontSize:24,letterSpacing:4}}>LOADING...</div>;

  return(
    <div style={{fontFamily:"'DM Mono','Courier New',monospace",background:"#0d0d0d",minHeight:"100vh",color:"#e8e0d5",paddingBottom:80}}>

      {flash&&<div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:flash.type==="error"?"#2a1010":"#0f2010",border:`1px solid ${flash.type==="error"?"#8b2222":"#2a7a2a"}`,color:flash.type==="error"?"#e87070":"#70e870",padding:"10px 24px",borderRadius:4,fontSize:12,zIndex:999,letterSpacing:1,pointerEvents:"none",whiteSpace:"nowrap"}}>{flash.msg}</div>}

      {/* Header */}
      <div style={{borderBottom:"1px solid #1a1815",padding:"20px 24px 16px"}}>
        <div style={{maxWidth:820,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>
          <div>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:40,letterSpacing:4,color:"#e8c84a",lineHeight:1}}>IRON LOG</div>
            <div style={{fontSize:10,color:"#3a3530",letterSpacing:3,marginTop:5}}>WORKOUT TRACKER · KG · {todayIsoWk}</div>
          </div>
          <div style={{display:"flex",gap:20,alignItems:"center",flexWrap:"wrap"}}>
            {["log","history","dashboard","progression"].map(v=>(
              <button key={v} className={`nav-btn${view===v?" active":""}`} onClick={()=>setView(v)}>{v}</button>
            ))}
            <button className="csv-btn" onClick={exportCSV}>↓ CSV</button>
          </div>
        </div>
      </div>

      <div style={{maxWidth:820,margin:"0 auto",padding:"0 24px"}}>

        {/* ═══ LOG ═══ */}
        {view==="log"&&<>
          <div style={{marginTop:28,marginBottom:20,display:"flex",justifyContent:"space-between",alignItems:"flex-end",flexWrap:"wrap",gap:12}}>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:30,letterSpacing:2,color:"#fff"}}>LOG EXERCISE</div>
            {PHASE_TEMPLATES[phaseState.currentPhase]&&(
              <button onClick={()=>setDayModal(true)}
                style={{background:"#e8c84a",border:"none",color:"#0d0d0d",padding:"10px 22px",borderRadius:4,fontSize:11,letterSpacing:2,fontWeight:700,cursor:"pointer"}}
                onMouseEnter={e=>e.currentTarget.style.background="#d4b83e"}
                onMouseLeave={e=>e.currentTarget.style.background="#e8c84a"}>
                ▶ START WORKOUT
              </button>
            )}
          </div>

          {/* Cardio checkbox */}
          <div style={{background:"#111",border:"1px solid #1a1815",borderRadius:8,padding:"13px 20px",marginBottom:14,display:"flex",alignItems:"center",gap:12,cursor:"pointer"}} onClick={()=>toggleCardio(formDate)}>
            <div style={{width:20,height:20,borderRadius:4,border:`2px solid ${cardio[formDate]?"#4a9a4a":"#2a2820"}`,background:cardio[formDate]?"#4a9a4a":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all .15s"}}>
              {cardio[formDate]&&<span style={{color:"#fff",fontSize:13,lineHeight:1,fontWeight:700}}>✓</span>}
            </div>
            <span style={{fontSize:12,letterSpacing:1,color:cardio[formDate]?"#70e870":"#5a5550",userSelect:"none"}}>🏃 CARDIO COMPLETED TODAY</span>
            <span style={{fontSize:10,color:"#3a3530",marginLeft:"auto"}}>{fmtDow(formDate)}, {fmtDate(formDate)}</span>
          </div>

          {/* Manual log form */}
          <div style={{background:"#111",border:"1px solid #1a1815",borderRadius:8,padding:22,marginBottom:28}}>
            <div style={{marginBottom:20}}>
              <div style={{fontSize:9,letterSpacing:3,color:"#3a3530",marginBottom:8}}>DATE</div>
              <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
                <input type="date" value={formDate} max={today} onChange={e=>setFormDate(e.target.value)}
                  style={{background:"transparent",border:"1px solid #2a2820",borderRadius:4,color:"#e8e0d5",fontSize:14,padding:"8px 12px",cursor:"pointer"}}/>
                <span style={{fontSize:12,color:"#5a5550"}}>
                  {fmtDow(formDate)}
                  {formDate===today&&<span style={{marginLeft:8,fontSize:10,color:"#e8c84a",letterSpacing:1}}>TODAY</span>}
                </span>
                {formDate!==today&&<span onClick={()=>setFormDate(today)} style={{fontSize:10,color:"#4a4540",cursor:"pointer",textDecoration:"underline"}}>reset to today</span>}
              </div>
            </div>
            <div style={{borderTop:"1px solid #1a1815",marginBottom:20}}/>
            <div style={{fontSize:10,letterSpacing:3,color:"#3a3530",marginBottom:18}}>{editingId?"EDIT EXERCISE":"EXERCISE"}</div>

            <div style={{marginBottom:18}}>
              <div style={{display:"flex",gap:10,marginBottom:10}}>
                {[["FROM LIST",false],["CUSTOM",true]].map(([lbl,cm])=>(
                  <button key={lbl} onClick={()=>{setCustomMode(cm);setShowDrop(false);if(cm)setTimeout(()=>cusRef.current?.focus(),50)}}
                    style={{fontSize:10,letterSpacing:2,padding:"5px 14px",borderRadius:4,cursor:"pointer",border:`1px solid ${customMode===cm?"#e8c84a":"#2a2820"}`,background:customMode===cm?"#e8c84a18":"transparent",color:customMode===cm?"#e8c84a":"#5a5550"}}>
                    {lbl}
                  </button>
                ))}
              </div>
              {customMode
                ?<input ref={cusRef} value={form.exercise} onChange={e=>setForm(f=>({...f,exercise:e.target.value}))} placeholder="Type exercise name..."
                    style={{width:"100%",background:"transparent",border:"1px solid #2a2820",borderRadius:4,color:"#e8e0d5",fontSize:15,padding:"9px 12px"}}/>
                :<div ref={dropRef} style={{position:"relative"}}>
                  <div style={{display:"flex",alignItems:"center",border:"1px solid #2a2820",borderRadius:4}}>
                    <input ref={inpRef} value={form.exercise}
                      onChange={e=>{setForm(f=>({...f,exercise:e.target.value}));setExFilter(e.target.value);setShowDrop(true)}}
                      onFocus={()=>{setExFilter(form.exercise);setShowDrop(true)}}
                      onKeyDown={e=>{if(e.key==="Escape")setShowDrop(false)}}
                      placeholder="Select an exercise..."
                      style={{flex:1,background:"transparent",border:"none",color:"#e8e0d5",fontSize:15,padding:"9px 12px"}}/>
                    <span onClick={()=>{setShowDrop(s=>!s);setExFilter("");inpRef.current?.focus()}}
                      style={{color:"#3a3530",cursor:"pointer",fontSize:14,padding:"0 12px",userSelect:"none"}}
                      onMouseEnter={e=>e.target.style.color="#e8c84a"} onMouseLeave={e=>e.target.style.color="#3a3530"}>▾</span>
                  </div>
                  {showDrop&&(()=>{
                    const q=exFilter.toLowerCase();
                    const filtered=EXERCISE_LIST.map(g=>({...g,exercises:g.exercises.filter(ex=>ex.toLowerCase().includes(q))})).filter(g=>g.exercises.length);
                    if(!filtered.length)return null;
                    return(
                      <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,zIndex:100,background:"#161410",border:"1px solid #2a2820",borderRadius:6,maxHeight:260,overflowY:"auto",boxShadow:"0 12px 32px rgba(0,0,0,.8)"}}>
                        {filtered.map(grp=>(
                          <div key={grp.group}>
                            <div style={{padding:"10px 16px 4px",fontSize:9,letterSpacing:3,color:"#3a3530"}}>{grp.group}</div>

                              const last=getLastData(ex);
                              return(
                                <div key={ex} className="dd-item" onMouseDown={e=>{e.preventDefault();selectEx(ex)}}

                                  <span>{ex}</span>
                                  {last?.weight&&<span style={{fontSize:10,color:"#4a4540",letterSpacing:1}}>last {last.weight} kg</span>}
                                </div>
                              );
                            })}
                          </div>
                        ))}
                      </div>
                    );
                  })()}
                </div>
              }
            </div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:14,marginBottom:16}}>
              {[{l:"SETS",k:"sets",p:"5"},{l:"REPS",k:"reps",p:"5"},{l:"WEIGHT (KG)",k:"weight",p:"80"}].map(({l,k,p})=>(
                <div key={k}>
                  <div style={{fontSize:9,letterSpacing:3,color:"#3a3530",marginBottom:8}}>{l}</div>
                  <input value={form[k]} onChange={e=>setForm(f=>({...f,[k]:e.target.value}))} placeholder={p}

            </div>
            <textarea value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} placeholder="Notes — how it felt, form cues..." rows={2}
              style={{width:"100%",background:"transparent",border:"1px solid #2a2820",borderRadius:4,color:"#e8e0d5",fontSize:12,padding:"9px 12px",resize:"vertical",marginBottom:18}}/>

                  <div style={{width:12,height:12,borderRadius:"50%",background:form.pr?"#e8c84a":"#3a3530",position:"absolute",top:3,left:form.pr?19:3,transition:"all .2s"}}/>

                {editingId&&<button onClick={()=>{setEditingId(null);setForm({exercise:"",sets:"",reps:"",weight:"",notes:"",pr:false});setFormDate(today);setCustomMode(false)}} style={{background:"transparent",border:"1px solid #2a2820",color:"#5a5550",padding:"9px 18px",borderRadius:4,fontSize:11,letterSpacing:1,cursor:"pointer"}}>CANCEL</button>}
                <button onClick={addOrUpdate} style={{background:"#e8c84a",border:"none",color:"#0d0d0d",padding:"10px 28px",borderRadius:4,fontSize:11,letterSpacing:2,fontWeight:700,cursor:"pointer"}}
                  onMouseEnter={e=>e.currentTarget.style.background="#d4b83e"} onMouseLeave={e=>e.currentTarget.style.background="#e8c84a"}>
                  {editingId?"UPDATE":"+ LOG"}
                </button>
              </div>
            </div>
          </div>

          {/* Today's entries */}
          {todayEntries.length>0&&(
            <div>
              <div style={{fontSize:10,letterSpacing:3,color:"#3a3530",marginBottom:14}}>{formDate===today?"TODAY'S LOG":`LOG FOR ${fmtDate(formDate).toUpperCase()}`}</div>
              <div style={{background:"#111",border:"1px solid #1a1815",borderRadius:8,overflowX:"auto"}}>
                <div style={{minWidth:540,display:"grid",gridTemplateColumns:"1fr 46px 50px 72px 68px 46px 72px",padding:"10px 18px",fontSize:9,letterSpacing:3,color:"#3a3530",borderBottom:"1px solid #1a1815"}}>
                  <span>EXERCISE</span><span style={{textAlign:"center"}}>SET</span><span style={{textAlign:"center"}}>REPS</span><span style={{textAlign:"center"}}>WEIGHT</span><span style={{textAlign:"center"}}>REST</span><span style={{textAlign:"center"}}>PR</span><span/>

                {todayEntries.map((entry,idx)=>(
                  <div key={entry.id} className="entry-card" style={{minWidth:540,display:"grid",gridTemplateColumns:"1fr 46px 50px 72px 68px 46px 72px",padding:"12px 18px",borderBottom:idx<todayEntries.length-1?"1px solid #141210":"none",alignItems:"center",background:"#111"}}>
                    <div>
                      <div style={{fontSize:13,color:entry.warmup?"#8a7040":"#fff",display:"flex",alignItems:"center",gap:6}}>
                        {entry.exercise}
                        {entry.warmup&&<span style={{fontSize:9,color:"#8a7040",border:"1px solid #5a4020",borderRadius:3,padding:"1px 5px",letterSpacing:1}}>W-UP</span>}
                      </div>
                      {entry.notes&&!entry.warmup&&<div style={{fontSize:11,color:"#5a5550",fontStyle:"italic",marginTop:2}}>"{entry.notes}"</div>}
                    </div>
                    <span style={{textAlign:"center",fontSize:13,color:"#5a5550"}}>{entry.setNumber||"—"}</span>
                    <span style={{textAlign:"center",fontSize:15,color:"#e8c84a"}}>{entry.reps||"—"}</span>
                    <span style={{textAlign:"center",fontSize:14,color:"#e8c84a"}}>{entry.weight?`${entry.weight}kg`:"—"}</span>
                    <span style={{textAlign:"center",fontSize:11,color:"#4a4540"}}>{entry.restAfterSec?`${entry.restAfterSec}s`:"—"}</span>
                    <span style={{textAlign:"center",fontSize:14}}>{entry.pr?"🏆":<span style={{color:"#2a2820"}}>—</span>}</span>
                    <div style={{display:"flex",gap:8,justifyContent:"center",alignItems:"center"}}>
                      <span className="edit-btn" onClick={()=>startEdit(entry)} style={{fontSize:10,color:"#8a8075",letterSpacing:1}}>EDIT</span>
                      <span className="del-btn" onClick={()=>deleteEntry(entry.id)} style={{fontSize:20,color:"#6a2a2a",lineHeight:1}}>×</span>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </>}

        {/* ═══ HISTORY ═══ */}
        {view==="history"&&<>
          <div style={{marginTop:28,marginBottom:22,fontFamily:"'Bebas Neue',sans-serif",fontSize:30,letterSpacing:2,color:"#fff"}}>WORKOUT HISTORY</div>
          {byDate.length===0
            ?<div style={{textAlign:"center",color:"#2a2820",fontSize:12,letterSpacing:3,padding:"48px 0"}}>NO HISTORY YET</div>
            :byDate.map(({date,list})=>{
              const isExp=expandedDate===date;
              const working=list.filter(e=>!e.warmup);
              const vol=working.reduce((a,e)=>a+(parseInt(e.sets)||0)*(parseInt(e.reps)||0)*(parseFloat(e.weight)||0),0);
              const hasPR=list.some(e=>e.pr);
              return(
                <div key={date} style={{marginBottom:10}}>
                  <div className="date-group-row" onClick={()=>setExpandedDate(isExp?null:date)}
                    style={{background:"#111",border:"1px solid #1a1815",borderRadius:isExp?"8px 8px 0 0":8,padding:"14px 20px",display:"grid",gridTemplateColumns:"1fr auto auto auto auto auto",gap:12,alignItems:"center"}}>
                    <div>
                      <div style={{fontSize:13,color:"#e8e0d5"}}>
                        {fmtDow(date)}, {fmtDate(date)}
                        {date===today&&<span style={{marginLeft:10,fontSize:9,color:"#e8c84a",letterSpacing:2}}>TODAY</span>}
                      </div>
                      <div style={{fontSize:10,color:"#3a3530",marginTop:2}}>{isoWeek(date)} · {list.length} exercise{list.length!==1?"s":""}</div>

                    <div style={{background:"#0e0e0c",border:"1px solid #1a1815",borderTop:"none",borderRadius:"0 0 8px 8px",padding:"16px 18px"}}>

                        const exEntries=list.filter(e=>e.exercise===exName).sort((a,b)=>(a.setNumber||0)-(b.setNumber||0));
                        return(
                          <div key={exName} style={{marginBottom:12}}>
                            <div style={{fontSize:11,color:"#8a8075",letterSpacing:1,marginBottom:5,paddingBottom:4,borderBottom:"1px solid #161410"}}>{exName}</div>

                                <span style={{fontSize:12,color:e.warmup?"#8a7040":"#e8c84a",fontFamily:"'Bebas Neue',sans-serif",letterSpacing:.5}}>{e.weight?`${e.weight} kg`:"—"}</span>
                                <span style={{fontSize:10,color:"#4a4540"}}>{e.restAfterSec?`${e.restAfterSec}s rest`:""}</span>
                                <span style={{fontSize:10,color:"#4a4540"}}>{e.pr?"🏆":""}{e.notes&&!e.warmup?` "${e.notes}"`:""}</span>
                              </div>
                            ))}
                          </div>
                        );
                      })}
                      {cardio[date]&&<div style={{fontSize:11,color:"#4a7a4a",paddingTop:8,borderTop:"1px solid #161410",marginTop:4}}>🏃 Cardio completed</div>}
                    </div>
                  )}
                </div>
              );
            })
          }
        </>}

        {/* ═══ DASHBOARD ═══ */}
        {view==="dashboard"&&<>
          <div style={{marginTop:28,marginBottom:6,fontFamily:"'Bebas Neue',sans-serif",fontSize:30,letterSpacing:2,color:"#fff"}}>DASHBOARD</div>
          <div style={{fontSize:11,color:"#3a3530",marginBottom:24}}>{todayIsoWk} · {fmtDate(thisMonStart)} — {fmtDate(thisWeekEnd)}</div>
          {entries.length===0
            ?<div style={{textAlign:"center",color:"#2a2820",fontSize:12,letterSpacing:3,padding:"48px 0"}}>LOG WORKOUTS TO SEE YOUR STATS</div>
            :<>
              <div style={{fontSize:10,letterSpacing:3,color:"#3a3530",marginBottom:14}}>THIS WEEK</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:12,marginBottom:32}}>
                {[
                  {label:"TOTAL VOLUME",val:curStat.vol.toLocaleString(),unit:"kg",delta:prevStat?pct(curStat.vol,prevStat.vol):null,deltaUnit:"%",sub:prevStat?`prev ${prevStat.vol.toLocaleString()} kg`:"no prior week"},
                  {label:"WORKING SETS", val:curStat.totalSets,unit:"sets",delta:prevStat?curStat.totalSets-prevStat.totalSets:null,deltaUnit:"",sub:prevStat?`prev ${prevStat.totalSets}`:"no prior week"},
                  {label:"EXERCISES",   val:curStat.totalEx,unit:"logged",delta:prevStat?pct(curStat.totalEx,prevStat.totalEx):null,deltaUnit:"%",sub:prevStat?`prev ${prevStat.totalEx}`:"no prior week"},
                  {label:"DAYS ACTIVE", val:curStat.activeDays,unit:"/ 7",delta:prevStat?curStat.activeDays-prevStat.activeDays:null,deltaUnit:" days",sub:prevStat?`prev ${prevStat.activeDays} days`:"no prior week"},
                ].map(({label,val,unit,delta,deltaUnit,sub})=>(
                  <div key={label} className="top-stat">
                    <div style={{fontSize:9,letterSpacing:3,color:"#3a3530",marginBottom:10}}>{label}</div>
                    <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:32,color:"#e8c84a",letterSpacing:1,lineHeight:1,marginBottom:4}}>{val}<span style={{fontSize:14,color:"#5a5550"}}> {unit}</span></div>
                    {delta!==null&&<DeltaBadge val={delta} unit={deltaUnit}/>}
                    <div style={{fontSize:10,color:"#3a3530",marginTop:5}}>{sub}</div>
                  </div>
                ))}
              </div>
              {curStat.prs>0&&(
                <div style={{background:"#13100a",border:"1px solid #3a3010",borderRadius:8,padding:"14px 20px",marginBottom:32,display:"flex",alignItems:"center",gap:14}}>
                  <span style={{fontSize:24}}>🏆</span>
                  <div>
                    <div style={{fontSize:12,color:"#e8c84a",letterSpacing:1}}>{curStat.prs} PR{curStat.prs!==1?"S":""} THIS WEEK</div>
                    <div style={{fontSize:11,color:"#5a5040",marginTop:3}}>{entries.filter(e=>e.date>=thisMonStart&&e.date<=thisWeekEnd&&e.pr).map(e=>e.exercise).join(" · ")}</div>
                  </div>
                </div>
              )}
              {loggedExes.length>0&&(
                <div>
                  <div style={{fontSize:10,letterSpacing:3,color:"#3a3530",marginBottom:14}}>EXERCISE PROGRESSION</div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:12}}>
                    {loggedExes.map(ex=>{
                      const hist=exHistory(ex);
                      if(!hist.length)return null;
                      const latest=hist[hist.length-1],maxW=Math.max(...hist.map(h=>h.weight)),hasPR=hist.some(h=>h.pr);
                      const thisW=exWeekMax(ex,thisMonStart),lastW=lastMonStart?exWeekMax(ex,lastMonStart):null;
                      const overload=thisW!==null&&lastW!==null?+(thisW-lastW).toFixed(1):null;
                      const overloadPct=thisW&&lastW&&lastW>0?Math.round(((thisW-lastW)/lastW)*100):null;
                      return(
                        <div key={ex} className="stat-card">
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                            <div style={{fontSize:12,color:"#fff"}}>{ex}</div>
                            {hasPR&&<span style={{fontSize:9,background:"#e8c84a18",color:"#e8c84a",border:"1px solid #e8c84a33",borderRadius:3,padding:"2px 7px",letterSpacing:1}}>PR</span>}
                          </div>
                          <div style={{display:"flex",gap:18,marginBottom:14,flexWrap:"wrap"}}>
                            <div>
                              <div style={{fontSize:8,color:"#3a3530",letterSpacing:3,marginBottom:3}}>CURRENT</div>
                              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:26,color:"#e8c84a",letterSpacing:1,lineHeight:1}}>{latest.weight||"—"}<span style={{fontSize:12,color:"#5a5550"}}> kg</span></div>
                              <div style={{fontSize:9,color:"#3a3530",marginTop:2}}>{fmtDateShort(latest.date)}</div>
                            </div>
                            <div>
                              <div style={{fontSize:8,color:"#3a3530",letterSpacing:3,marginBottom:3}}>BEST</div>
                              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:26,color:"#7a7570",letterSpacing:1,lineHeight:1}}>{maxW||"—"}<span style={{fontSize:12,color:"#5a5550"}}> kg</span></div>
                            </div>
                            {overload!==null&&(
                              <div>
                                <div style={{fontSize:8,color:"#3a3530",letterSpacing:3,marginBottom:3}}>WK OVERLOAD</div>
                                <div style={{display:"flex",alignItems:"baseline",gap:4}}>
                                  <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:26,letterSpacing:1,lineHeight:1,color:overload>0?"#4a9a4a":overload<0?"#9a4a4a":"#5a5550"}}>{overload>0?"+":""}{overload}<span style={{fontSize:12,color:"#5a5550"}}> kg</span></div>
                                  {overloadPct!==null&&<span style={{fontSize:10,color:overload>0?"#4a9a4a":overload<0?"#9a4a4a":"#5a5550"}}>({overload>0?"+":""}{overloadPct}%)</span>}
                                </div>
                                <div style={{fontSize:9,color:"#3a3530",marginTop:2}}>vs last week · {lastW} kg</div>
                              </div>
                            )}
                          </div>
                          {hist.length>1&&(
                            <div style={{display:"flex",gap:3,alignItems:"flex-end",height:32,marginBottom:8}}>
                              {hist.slice(-10).map((h,i)=>{const p=maxW>0?(h.weight/maxW)*100:0;return<div key={i} title={`${fmtDateShort(h.date)} · ${h.weight} kg`} style={{flex:1,background:h.pr?"#e8c84a":"#252220",height:`${Math.max(p,10)}%`,borderRadius:"2px 2px 0 0",minWidth:6}}/>;})}
                            </div>
                          )}
                          <div style={{fontSize:10,color:"#3a3530",letterSpacing:1}}>{hist.length} session{hist.length!==1?"s":""} · latest {latest.sets}×{latest.reps}</div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </>
          }
        </>}

        {/* ═══ PROGRESSION ═══ */}
        {view==="progression"&&<>
          <div style={{marginTop:28,marginBottom:20,fontFamily:"'Bebas Neue',sans-serif",fontSize:30,letterSpacing:2,color:"#fff"}}>PROGRESSIVE OVERLOAD</div>

          {allStalled&&(
            <div style={{background:"#1a0808",border:"2px solid #8b2222",borderRadius:8,padding:"18px 22px",marginBottom:24,display:"flex",gap:16,alignItems:"flex-start"}}>
              <div style={{fontSize:28,lineHeight:1}}>🚨</div>
              <div>
                <div style={{fontSize:15,color:"#ff6060",letterSpacing:1,fontFamily:"'Bebas Neue',sans-serif",marginBottom:4}}>ALL THREE LIFTS HAVE STALLED</div>
                <div style={{fontSize:12,color:"#c07070",lineHeight:1.6}}>Consider transitioning to the next phase — take 10 days rest before resuming.</div>
                {nextPhaseObj&&<button onClick={()=>switchPhase(nextPhaseObj.id,"auto-stall")}
                  style={{marginTop:12,background:"#8b2222",border:"none",color:"#fff",padding:"8px 18px",borderRadius:4,fontSize:11,letterSpacing:2,cursor:"pointer",fontWeight:700}}>
                  MOVE TO PHASE {nextPhaseObj.id}: {nextPhaseObj.name} →
                </button>}
              </div>
            </div>
          )}

          {/* Phase selector */}
          <div style={{background:"#111",border:"1px solid #1a1815",borderRadius:8,padding:20,marginBottom:24}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18,flexWrap:"wrap",gap:12}}>
              <div>
                <div style={{fontSize:9,letterSpacing:3,color:"#3a3530",marginBottom:6}}>CURRENT PHASE</div>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,color:"#e8c84a",letterSpacing:2,lineHeight:1,marginBottom:4}}>PHASE {curPhaseObj.id}: {curPhaseObj.name}</div>
                <div style={{fontSize:11,color:"#5a5550"}}>{curPhaseObj.description}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:9,letterSpacing:3,color:"#3a3530",marginBottom:4}}>WEEKS IN PHASE</div>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:36,color:"#e8c84a",letterSpacing:2,lineHeight:1}}>{weeksInPhase}</div>
                {phaseState.phaseStartDate&&<div style={{fontSize:10,color:"#3a3530",marginTop:3}}>since {fmtDateShort(phaseState.phaseStartDate)}</div>}
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:20}}>
              {PHASES.map(ph=>{
                const active=ph.id===phaseState.currentPhase;
                return(
                  <div key={ph.id} className={active?"":"phase-pill"} onClick={()=>{if(!active)switchPhase(ph.id)}}
                    style={{border:`1px solid ${active?"#e8c84a":"#2a2820"}`,borderRadius:6,padding:"14px 16px",cursor:active?"default":"pointer",background:active?"#1a1710":"transparent"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                      <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:14,color:active?"#e8c84a":"#6a6560",letterSpacing:1}}>PHASE {ph.id}</div>
                      {active&&<span style={{fontSize:9,background:"#e8c84a",color:"#0d0d0d",borderRadius:3,padding:"2px 6px",letterSpacing:1,fontWeight:700}}>ACTIVE</span>}
                    </div>
                    <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:18,color:active?"#fff":"#5a5550",letterSpacing:1,marginBottom:4}}>{ph.name}</div>
                    <div style={{fontSize:10,color:"#4a4540",lineHeight:1.5}}>{ph.description}</div>
                  </div>
                );
              })}
            </div>
            {phaseState.transitions.length>0&&(
              <div>
                <div style={{fontSize:9,letterSpacing:3,color:"#2a2820",marginBottom:10}}>PHASE HISTORY</div>
                {[...phaseState.transitions].reverse().slice(0,5).map((t,i)=>(
                  <div key={i} style={{display:"flex",gap:12,alignItems:"center",fontSize:11,color:"#4a4540",marginBottom:4}}>
                    <span style={{color:"#3a3530"}}>{fmtDate(t.date)}</span>
                    <span>Phase {t.from} → Phase {t.to}</span>
                    {t.reason!=="manual"&&<span style={{fontSize:9,color:"#6a3030",letterSpacing:1}}>{t.reason}</span>}
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* Lift table */}
          <div style={{background:"#111",border:"1px solid #1a1815",borderRadius:8,marginBottom:24,overflowX:"auto"}}>
            <div style={{minWidth:620}}>
              <div style={{display:"grid",gridTemplateColumns:"1.4fr 1fr 1fr 1fr 1fr 130px",padding:"11px 20px",fontSize:9,letterSpacing:3,color:"#3a3530",borderBottom:"1px solid #1a1815",background:"#0e0e0c"}}>
                <span>LIFT</span><span style={{textAlign:"center"}}>LAST LOGGED</span><span style={{textAlign:"center"}}>THIS WEEK</span><span style={{textAlign:"center"}}>NEXT WEEK</span><span style={{textAlign:"center"}}>INCREMENT</span><span style={{textAlign:"center"}}>STATUS</span>
              </div>
              {progData.map((lift,idx)=>{
                const stallCount=phaseState.stallCounts[lift.id]||0,stallTriple=stallCount>=3||lift.stalledWeeks>=3;
                return(
                  <div key={lift.id} style={{borderBottom:idx<progData.length-1?"1px solid #161410":"none"}}>
                    <div style={{display:"grid",gridTemplateColumns:"1.4fr 1fr 1fr 1fr 1fr 130px",padding:"16px 20px",alignItems:"center",background:idx%2===0?"#111":"#0f0f0d"}}>
                      <div>
                        <div style={{fontSize:14,color:"#fff",marginBottom:2}}>{lift.label}</div>
                        <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                          {lift.startWeekKey&&<span style={{fontSize:10,color:"#3a3530"}}>+{lift.increment}kg/wk</span>}
                          {stallCount>0&&<span style={{fontSize:10,color:stallTriple?"#e87070":"#8a7060"}}>{stallTriple?"⚠":"·"} stalls:{stallCount}</span>}

                        {lift.prescribedWeight
                          ?<><div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:26,letterSpacing:1,lineHeight:1,color:lift.thisWeekActual?(lift.thisWeekActual>=lift.prescribedWeight?"#4a9a4a":"#e8c84a"):"#e8c84a"}}>{lift.prescribedWeight}<span style={{fontSize:12,color:"#5a5550"}}> kg</span></div>
                            {lift.thisWeekActual
                              ?<div style={{fontSize:10,color:lift.thisWeekActual>=lift.prescribedWeight?"#4a7a4a":"#7a6030",marginTop:2}}>logged {lift.thisWeekActual}kg {lift.thisWeekActual>=lift.prescribedWeight?"✓":"↓"}</div>
                              :<div style={{fontSize:10,color:"#3a3530",marginTop:2}}>{todayIsoWk} · pending</div>}</>
                          :<span style={{color:"#2a2820"}}>—</span>}
                      </div>
                      <div style={{textAlign:"center"}}>
                        {lift.nextWeight?<div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color:"#5a6a5a",letterSpacing:1}}>{lift.nextWeight}<span style={{fontSize:11,color:"#4a4540"}}> kg</span></div>:<span style={{color:"#2a2820"}}>—</span>}
                      </div>
                      <div style={{textAlign:"center"}}>
                        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                          <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:18,color:"#4a9a4a",letterSpacing:1}}>+{lift.increment}</span>
                          <span style={{fontSize:11,color:"#4a4540"}}>kg</span>
                          <select value={lift.increment} onChange={e=>{const v=parseFloat(e.target.value);const nc=progCfg.map(l=>l.id===lift.id?{...l,increment:v}:l);setProgCfg(nc);saveProg(startWeights,nc)}}
                            style={{background:"#1a1815",border:"1px solid #2a2820",borderRadius:3,color:"#6a6560",fontSize:10,padding:"2px 4px",cursor:"pointer",marginLeft:4}}>
                            {[0.5,1,1.25,2,2.5,5].map(v=><option key={v} value={v}>{v}</option>)}
                          </select>
                        </div>
                      </div>
                      <div style={{textAlign:"center"}}>
                        <div style={{display:"flex",flexDirection:"column",gap:5,alignItems:"center"}}>
                          {lift.stalled||stallTriple
                            ?<span style={{display:"inline-block",background:"#2a1010",border:"1px solid #8b2222",color:"#e87070",borderRadius:4,padding:"4px 8px",fontSize:10,letterSpacing:1}}>⚠ STALLED</span>
                            :lift.thisWeekActual&&lift.prescribedWeight&&lift.thisWeekActual>=lift.prescribedWeight
                              ?<span style={{display:"inline-block",background:"#0d1f0d",border:"1px solid #2a7a2a",color:"#70e870",borderRadius:4,padding:"4px 8px",fontSize:10,letterSpacing:1}}>✓ ON TRACK</span>
                              :lift.hasData
                                ?<span style={{display:"inline-block",background:"#1a1815",border:"1px solid #2a2820",color:"#5a5550",borderRadius:4,padding:"4px 8px",fontSize:10,letterSpacing:1}}>PENDING</span>
                                :<span style={{display:"inline-block",background:"#1a1815",border:"1px solid #2a2820",color:"#3a3530",borderRadius:4,padding:"4px 8px",fontSize:10,letterSpacing:1}}>NO DATA</span>
                          }
                          <button className="stall-btn" onClick={()=>bumpStall(lift.id)}>+ stall</button>
                        </div>
                      </div>
                    </div>
                    {lift.history.length>1&&(
                      <div style={{padding:"0 20px 14px",display:"flex",gap:4,alignItems:"flex-end",height:32}}>
                        <span style={{fontSize:9,color:"#2a2820",letterSpacing:2,marginRight:8,whiteSpace:"nowrap",paddingBottom:2}}>8W</span>
                        {lift.history.map((h,i)=>{const mw=Math.max(...lift.history.map(x=>x.weight));return<div key={i} title={`${h.wk}: ${h.weight} kg`} style={{flex:1,background:"#252220",height:`${Math.max(mw>0?(h.weight/mw)*100:0,15)}%`,borderRadius:"2px 2px 0 0",minWidth:8,maxWidth:32}}/>;  })}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>

          {/* Set starting weight */}
          <div style={{background:"#111",border:"1px solid #1a1815",borderRadius:8,padding:20}}>
            <div style={{fontSize:10,letterSpacing:3,color:"#3a3530",marginBottom:4}}>SET STARTING WEIGHT</div>
            <div style={{fontSize:11,color:"#4a4540",marginBottom:18}}>Override the starting point if you're picking up from an existing training weight.</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>
              {progData.map(lift=>(
                <div key={lift.id}>
                  <div style={{fontSize:10,color:"#5a5550",letterSpacing:1,marginBottom:8}}>{lift.label}</div>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    <input type="number" placeholder={lift.startWeight?String(lift.startWeight):"kg"} step="1.25"
                      onBlur={e=>{const v=parseFloat(e.target.value);if(!v)return;const nsw={...startWeights,[lift.id]:{weight:v,weekStart:isoWeek(toDateStr())}};setStartWeights(nsw);saveProg(nsw,progCfg);flash2(`Start weight set: ${lift.label}`);e.target.value=""}}
                      style={{width:"100%",background:"transparent",border:"1px solid #2a2820",borderRadius:4,color:"#e8e0d5",fontSize:14,padding:"8px 10px"}}/>
                    <span style={{fontSize:12,color:"#4a4540"}}>kg</span>
                  </div>
                  {lift.startWeight&&<div style={{fontSize:10,color:"#3a3530",marginTop:5}}>Current: {lift.startWeight} kg · {lift.startWeekKey}</div>}
                </div>
              ))}
            </div>
          </div>
        </>}

      </div>{/* /content */}

      {/* ── Day Picker Modal ── */}
      {dayModal&&(()=>{
        const tmpls=PHASE_TEMPLATES[phaseState.currentPhase]||[];
        return<>
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.82)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:"16px"}} onClick={()=>setDayModal(false)}>
          <div className="fade-in" onClick={e=>e.stopPropagation()} style={{background:"#161410",border:"1px solid #2a2820",borderRadius:8,width:"min(520px,100%)",display:"flex",flexDirection:"column",boxShadow:"0 24px 64px rgba(0,0,0,.95)",maxHeight:"90vh"}}>
            {/* Header — fixed, never scrolls */}
            <div style={{padding:"20px 22px 16px",borderBottom:"1px solid #1a1815",flexShrink:0,display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:24,letterSpacing:2,color:"#e8c84a",lineHeight:1}}>START WORKOUT</div>
                <div style={{fontSize:10,color:"#3a3530",letterSpacing:2,marginTop:5}}>PHASE {phaseState.currentPhase}: {curPhaseObj.name} · {todayIsoWk}</div>
              </div>
              <span onClick={()=>setDayModal(false)} style={{fontSize:26,color:"#5a5550",cursor:"pointer",padding:"2px 8px",lineHeight:1}}>×</span>
            </div>
            {/* Day cards — scrollable area */}
            <div style={{overflowY:"auto",flex:1,padding:"14px 16px 20px",display:"flex",flexDirection:"column",gap:10}}>
              {tmpls.map(tmpl=>{
                const alreadyLogged=entries.some(e=>e.date===formDate&&tmpl.exercises.some(ex=>ex.name===e.exercise));
                return(
                  <DayCard key={tmpl.day} tmpl={tmpl} alreadyLogged={alreadyLogged}
                    tmplWeight={tmplWeight}
                    onStart={()=>{setDayModal(false);setGuided({template:tmpl})}}/>
                );
              })}
            </div>
          </div>
          </div>
        </>;
      })()}

      {/* ── Guided Workout ── */}
      {guided&&(
        <GuidedWorkout
          template={guided.template}
          progData={progData}
          formDate={formDate}
          entries={entries}
          onSave={newEntries=>{
            const merged=[...entries,...newEntries];
            setEntries(merged);saveEntries(merged);
            setGuided(null);
            flash2(`Workout saved — ${newEntries.length} sets logged`);
          }}
          onClose={()=>setGuided(null)}
        />
      )}

      {/* ── CSV Modal ── */}
      {csvModal&&<>
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.75)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:"16px"}} onClick={()=>setCsvModal(false)}>
        <div onClick={e=>e.stopPropagation()} style={{background:"#161410",border:"1px solid #2a2820",borderRadius:8,padding:28,width:"min(640px,100%)",maxHeight:"80vh",display:"flex",flexDirection:"column",boxShadow:"0 24px 64px rgba(0,0,0,.9)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <div>
              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,letterSpacing:2,color:"#e8c84a"}}>EXPORT DATA</div>
              <div style={{fontSize:10,color:"#3a3530",letterSpacing:2,marginTop:3}}>{entries.length} ENTRIES · CSV FORMAT</div>
            </div>
            <span onClick={()=>setCsvModal(false)} style={{fontSize:22,color:"#5a5550",cursor:"pointer"}}>×</span>
          </div>
          <div style={{fontSize:11,color:"#6a6560",marginBottom:14,lineHeight:1.7}}>
            Select all text, copy, then paste into a <strong style={{color:"#9a9590"}}>.txt file</strong> → save as <strong style={{color:"#9a9590"}}>iron-log.csv</strong>, or paste directly into Google Sheets / Excel.
          </div>
          <textarea readOnly value={csvContent} onFocus={e=>e.target.select()} onClick={e=>e.target.select()}
            style={{flex:1,minHeight:220,background:"#0d0d0d",border:"1px solid #2a2820",borderRadius:4,color:"#a8a09a",fontSize:11,padding:"12px 14px",fontFamily:"monospace",resize:"none",lineHeight:1.5}}/>
          <div style={{display:"flex",gap:10,marginTop:16}}>
            <button onClick={()=>navigator.clipboard.writeText(csvContent).then(()=>{flash2("Copied!");setCsvModal(false)}).catch(()=>flash2("Copy the text above manually.","error"))}
              style={{flex:1,background:"#e8c84a",border:"none",color:"#0d0d0d",padding:"11px",borderRadius:4,fontSize:11,letterSpacing:2,fontWeight:700,cursor:"pointer"}}>
              COPY TO CLIPBOARD
            </button>
            <button onClick={()=>setCsvModal(false)} style={{background:"transparent",border:"1px solid #2a2820",color:"#5a5550",padding:"11px 20px",borderRadius:4,fontSize:11,cursor:"pointer"}}>CLOSE</button>
          </div>
        </div>
        </div>
      </>}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
